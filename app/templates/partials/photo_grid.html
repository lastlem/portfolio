{% for photo in photos %}
<div class="photo-item group relative overflow-hidden bg-zinc-900 rounded-lg break-inside-avoid w-full mb-2 sm:mb-4"
     id="photo-{{ photo.id }}"
     data-id="{{ photo.id }}"
     data-w="{{ photo.img_width or 400 }}"
     data-h="{{ photo.img_height or 300 }}">

    <!-- Maintain aspect ratio based on original image size to prevent layout shifts -->
    <div style="padding-bottom: {{ (photo.img_height / photo.img_width * 100) if (photo.img_width and photo.img_width > 0) else 75 }}%;"></div>

    {% if photo.status == 'processing' %}
        <!-- Pulsing placeholder while processing -->
        <div class="absolute inset-0 bg-zinc-800 animate-pulse flex flex-col items-center justify-center">
            <svg class="animate-spin h-6 w-6 text-zinc-500 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-[10px] sm:text-xs text-zinc-500 font-medium tracking-wider uppercase">Processing</span>
        </div>
    {% else %}
        <!-- Actual Image -->
        <div class="photo-skeleton absolute inset-0 bg-zinc-800 animate-pulse"></div>
        <img src="{{ url_for('static', filename=photo.sizes_dict['400w']) }}"
             srcset="{{ url_for('static', filename=photo.sizes_dict['400w']) }} 400w, {{ url_for('static', filename=photo.sizes_dict['800w']) }} 800w"
             sizes="(max-width: 768px) 100vw, (max-width: 1024px) 33vw, 25vw"
             data-medium="{{ url_for('static', filename=photo.sizes_dict['1600w']) }}"
             data-full="{{ url_for('static', filename=photo.original_path) }}"
             class="absolute inset-0 w-full h-full object-cover cursor-pointer opacity-0 transition-all duration-300 group-hover:scale-[1.03]"
             loading="lazy"
             alt="Photo"
             onload="this.previousElementSibling.style.display='none'; this.style.opacity='1';"
             onclick="window.dispatchEvent(new CustomEvent('open-lightbox', {detail: { medium: this.dataset.medium, full: this.dataset.full } }))">

        <!-- Public Actions (Visible to everyone on hover) -->
        <div class="absolute bottom-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 flex gap-2">
            <a href="{{ url_for('static', filename=photo.original_path) }}" download
                class="bg-black/60 backdrop-blur-md text-white px-2 py-2 rounded-full hover:bg-white hover:text-black transition-colors border border-white/10 shadow-lg flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
            </a>
        </div>
    {% endif %}

    {% if is_admin %}
    <!-- Drag Handle -->
    <div class="drag-handle absolute top-2 left-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 cursor-move bg-black/60 backdrop-blur-md text-white p-2 rounded-full hover:bg-white hover:text-black border border-white/10 shadow-lg flex items-center justify-center">
        <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </div>
    
    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 flex flex-col gap-2">
        <!-- Set Cover Button -->
        <form action="{{ url_for('main.set_cover', album_id=photo.album_id, photo_id=photo.id) }}" method="POST">
            <button type="submit"
                class="w-full bg-black/60 backdrop-blur-md text-white text-[10px] px-3 py-1.5 rounded-full hover:bg-white hover:text-black transition-colors border border-white/10 shadow-lg flex items-center justify-center gap-1">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
                Make Cover
            </button>
        </form>

        <!-- Delete Photo Button -->
        <button onclick="if(confirm('Delete photo?')) deletePhoto({{ photo.id }})"
            class="w-full bg-red-500/60 backdrop-blur-md text-white text-[10px] px-3 py-1.5 rounded-full hover:bg-red-500 hover:text-white transition-colors border border-red-500/20 shadow-lg flex items-center justify-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            Delete
        </button>
    </div>
    {% endif %}
</div>
{% endfor %}

{% if is_admin and not photos_script_added %}
<script>
    async function deletePhoto(photoId) {
        try {
            const res = await fetch(`/delete_photo/${photoId}`, { method: 'POST' });
            if (res.ok) {
                const el = document.getElementById(`photo-${photoId}`);
                if (el) el.remove();
            } else {
                alert('Failed to delete photo');
            }
        } catch (err) {
            console.error(err);
            alert('Error deleting photo');
        }
    }
</script>
{% set photos_script_added = True %}
{% endif %}
